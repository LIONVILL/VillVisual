rules:
  - trigger: BLOCK_PLACE
    target: DIAMOND_BLOCK
    effects:
      - type: FLAME
        amount: 50
        speed: 0.05
        offset:
          x: 0.5
          y: 0.5
          z: 0.5
  - trigger: JOIN
    effects:
      - type: TITLE
        title: "<gold>Welcome!</gold>"
        subtitle: "<yellow>Enjoy your stay</yellow>"
        fadeIn: 10
        stay: 40
        fadeOut: 10
      - type: SOUND
        sound: ENTITY_PLAYER_LEVELUP
        volume: 1.0
        pitch: 1.0